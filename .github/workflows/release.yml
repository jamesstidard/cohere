name: Release

# One synced release for all bindings. Pick a version; this stamps it across
# every manifest, builds the Swift XCFramework, Python wheels (abi3, per OS) +
# sdist, and the WASM npm tarball, then publishes a single vX.Y.Z GitHub Release
# with everything attached. Consumers install from the release assets — no npm
# or PyPI account required. Triggered by hand (not by tag push) so the Swift
# checksum can be committed to the tag without rewriting it.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version, e.g. 0.2.0 (tag will be v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  swift:
    runs-on: macos-14
    outputs:
      checksum: ${{ steps.checksum.outputs.value }}
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/set-version.sh "${{ inputs.version }}"
      - name: Install Apple Rust targets
        run: |
          rustup target add \
            aarch64-apple-darwin x86_64-apple-darwin \
            aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios
      - name: Build XCFramework
        run: PROFILE=release ./bindings/swift/Cohere/build-xcframework.sh
      - name: Zip XCFramework
        run: ditto -c -k --keepParent bindings/swift/Cohere/Cohere.xcframework Cohere.xcframework.zip
      - name: Compute checksum
        id: checksum
        run: echo "value=$(swift package compute-checksum Cohere.xcframework.zip)" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: swift
          path: Cohere.xcframework.zip

  python-wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64 }
          - { os: ubuntu-latest, target: aarch64 }
          - { os: macos-14, target: aarch64 }
          - { os: macos-13, target: x86_64 }
          - { os: windows-latest, target: x64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Stamp version
        run: ./scripts/set-version.sh "${{ inputs.version }}"
        shell: bash
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --features abi3 --manifest-path bindings/python/Cargo.toml --out dist
          target: ${{ matrix.target }}
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: python-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  python-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/set-version.sh "${{ inputs.version }}"
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --manifest-path bindings/python/Cargo.toml --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: dist/*.tar.gz

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/set-version.sh "${{ inputs.version }}"
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM package
        run: wasm-pack build bindings/wasm --release --target bundler --out-dir pkg
      - name: Pack npm tarball
        run: |
          (cd bindings/wasm/pkg && npm pack)
          mv bindings/wasm/pkg/*.tgz "cohere-wasm-${{ inputs.version }}.tgz"
      - uses: actions/upload-artifact@v4
        with:
          name: wasm
          path: cohere-wasm-*.tgz

  release:
    needs: [swift, python-wheels, python-sdist, wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stamp version and Swift checksum
        run: |
          ./scripts/set-version.sh "${{ inputs.version }}"
          sed -i -E 's|(let releaseChecksum = ")[^"]*(")|\1${{ needs.swift.outputs.checksum }}\2|' Package.swift

      - name: Commit, tag, and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -u
          git commit -m "Release v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          # checkout leaves HEAD detached, so push to the branch ref explicitly.
          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "v${{ inputs.version }}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ inputs.version }}" \
            $(find artifacts -type f) \
            --title "v${{ inputs.version }}" \
            --generate-notes
